<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ApexTrader AI</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.header {
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.card {
    background:#1e293b;
    margin:20px;
    padding:20px;
    border-radius:15px;
}

.status {
    color:#22c55e;
    font-size:20px;
}

.price {
    font-size:25px;
    color:#38bdf8;
}

.signal {
    font-size:22px;
}

button {
    padding:12px 20px;
    border:0;
    border-radius:10px;
    background:#2563eb;
    color:white;
}
</style>

</head>

<body>

<div class="header">
🚀 ApexTrader AI
</div>


<div class="card">
<h2>Bot Status</h2>
<p class="status">Loading...</p>
</div>


<div class="card">
<h2>Market</h2>
<p>BTC/USDT</p>
<p class="price" id="price">Loading...</p>
</div>


<div class="card">
<h2>Trading Signal</h2>
<p class="signal" id="signal">
Waiting...
</p>
</div>


<div class="card">
<h2>Control</h2>
<button>START BOT</button>
<button>STOP BOT</button>
</div>


<script>

async function updateStatus(){

const response = await fetch("/status");

const data = await response.json();


document.querySelector(".status").innerHTML =
"🟢 " + data.bot;


document.getElementById("price").innerHTML =
"$ " + Number(data.price).toLocaleString();


document.getElementById("signal").innerHTML =
"📊 " + data.signal;


}


updateStatus();

setInterval(updateStatus,5000);


</script>


</body>
</html>
